# deploy-vprod.yml — Deploy to the production server
#
# Triggers
# --------
#   • Automatic: every push to `main`
#   • Manual:    GitHub UI → Actions → "Deploy — Production" → Run workflow
#                (lets you pass a fresh token if you just reset it)
#
# Required GitHub Secrets (Settings → Secrets → Actions)
# -------------------------------------------------------
#   DISCORD_TOKEN   — The bot token from discord.com/developers/applications
#   SSH_HOST        — Server IP or hostname  (e.g. 12.34.56.78)
#   SSH_USER        — Linux user with sudo   (e.g. ubuntu, admin)
#   SSH_KEY         — Private SSH key for that user (PEM / OpenSSH format)
#   SSH_PORT        — (optional) SSH port, defaults to 22
#
# How the token stays safe
# ------------------------
#   1. The token lives ONLY in GitHub Secrets — never in the repo.
#   2. GitHub Actions decrypts it inside its own isolated runner.
#   3. The runner SSHes into your server and exports DISCORD_TOKEN just
#      for the duration of install-vprod.sh.
#   4. install-vprod.sh writes it to /var/lib/vprod/.env (chmod 600,
#      owned by vprodbot only) and immediately drops it from the environment.
#   5. The systemd service reads the file via EnvironmentFile= — the token
#      is never visible to other processes or log files.
#   6. git pull on the server can NEVER overwrite /var/lib/vprod/.env
#      because that path is outside /opt/vprod (the git checkout).
#
# Rotating the token
# ------------------
#   1. Reset the token on discord.com/developers/applications.
#   2. Update the DISCORD_TOKEN secret in GitHub (Settings → Secrets → Actions).
#   3. Re-run this workflow (manual trigger) — it will update /var/lib/vprod/.env
#      and restart the bot automatically.

name: "Deploy — Production"

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_reclone:
        description: "Wipe /opt/vprod and re-clone (use after major restructure)"
        required: false
        default: "0"
        type: choice
        options: ["0", "1"]
      skip_start:
        description: "Install without starting the service"
        required: false
        default: "0"
        type: choice
        options: ["0", "1"]

jobs:
  deploy:
    name: "Deploy to production"
    runs-on: ubuntu-latest
    environment: production          # optional: require manual approval in GitHub
    permissions:
      contents: read                 # only read the repo — no write access needed

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4

      - name: "Set up SSH agent"
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: "Add server to known_hosts"
        run: |
          SSH_PORT="${{ secrets.SSH_PORT || '22' }}"
          ssh-keyscan -p "${SSH_PORT}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: "Deploy to server"
        env:
          # The token is decrypted by GitHub's runner here and passed over SSH.
          # It is never written to disk on the runner, only piped into the remote shell.
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          FORCE_RECLONE: ${{ github.event.inputs.force_reclone || '0' }}
          SKIP_START:    ${{ github.event.inputs.skip_start    || '0' }}
          SSH_PORT:      ${{ secrets.SSH_PORT || '22' }}
        run: |
          ssh -p "${SSH_PORT}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "sudo --preserve-env=DISCORD_TOKEN,FORCE_RECLONE,SKIP_START \
              DISCORD_TOKEN='${DISCORD_TOKEN}' \
              FORCE_RECLONE='${FORCE_RECLONE}' \
              SKIP_START='${SKIP_START}' \
              bash /opt/vprod/scripts/install-vprod.sh"

      - name: "Verify bot is running"
        env:
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          ssh -p "${SSH_PORT}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "systemctl is-active vprod && echo 'vprod is running' \
             || { echo 'vprod is NOT running — check logs:'; \
                  sudo journalctl -u vprod -n 30 --no-pager; exit 1; }"
