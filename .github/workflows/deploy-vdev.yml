# deploy-vdev.yml — Deploy to the development server
#
# Triggers
# --------
#   • Manual only: GitHub UI → Actions → "Deploy — Dev" → Run workflow
#   • Automatic:   push to the `dev` branch (uncomment the on.push block below)
#
# Required GitHub Secrets (Settings → Secrets → Actions)
# -------------------------------------------------------
#   DISCORD_TOKEN_DEV   — A SEPARATE bot token for the dev instance.
#                         Use a different Discord application for dev so you
#                         never share a token between environments.
#   SSH_HOST_DEV        — Dev server IP or hostname
#   SSH_USER_DEV        — Linux user with sudo on the dev server
#   SSH_KEY_DEV         — Private SSH key for that user
#   SSH_PORT_DEV        — (optional) SSH port, defaults to 22
#
# Why a separate token?
# ---------------------
#   Discord resets a token the moment it detects it in a public repo.
#   A separate dev bot application means:
#     • A production token reset doesn't break dev (and vice versa).
#     • You can give the dev bot different permissions without affecting prod.
#     • Incident blast radius is contained.
#
# Local dev (no server needed)
# ----------------------------
#   Run install-vdev.sh locally instead:
#       bash scripts/install-vdev.sh
#   Token is stored in ./data/.env (gitignored).

name: "Deploy — Dev"

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: false
        default: "dev"
      force_reclone:
        description: "Wipe app dir and re-clone"
        required: false
        default: "0"
        type: choice
        options: ["0", "1"]

  # Uncomment to auto-deploy on every push to dev:
  # push:
  #   branches:
  #     - dev

jobs:
  deploy-dev:
    name: "Deploy to dev"
    runs-on: ubuntu-latest
    permissions:
      contents: read                 # only read the repo — no write access needed

    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'dev' }}

      - name: "Set up SSH agent"
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY_DEV }}

      - name: "Add dev server to known_hosts"
        run: |
          SSH_PORT="${{ secrets.SSH_PORT_DEV || '22' }}"
          ssh-keyscan -p "${SSH_PORT}" -H "${{ secrets.SSH_HOST_DEV }}" >> ~/.ssh/known_hosts

      - name: "Deploy to dev server"
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN_DEV }}
          FORCE_RECLONE: ${{ github.event.inputs.force_reclone || '0' }}
          SSH_PORT:      ${{ secrets.SSH_PORT_DEV || '22' }}
          BRANCH:        ${{ github.event.inputs.branch || 'dev' }}
        run: |
          ssh -p "${SSH_PORT}" "${{ secrets.SSH_USER_DEV }}@${{ secrets.SSH_HOST_DEV }}" \
            "sudo --preserve-env=DISCORD_TOKEN,FORCE_RECLONE \
              DISCORD_TOKEN='${DISCORD_TOKEN}' \
              FORCE_RECLONE='${FORCE_RECLONE}' \
              SERVICE_NAME=vdev \
              APP_DIR=/opt/vdev \
              DATA_DIR=/var/lib/vdev \
              BOT_USER=vdevbot \
              ADMIN_GROUP=vdevadmins \
              REPO_URL='https://github.com/${{ github.repository }}.git' \
              bash /opt/vdev/scripts/install-vprod.sh"

      - name: "Verify dev bot is running"
        env:
          SSH_PORT: ${{ secrets.SSH_PORT_DEV || '22' }}
        run: |
          ssh -p "${SSH_PORT}" "${{ secrets.SSH_USER_DEV }}@${{ secrets.SSH_HOST_DEV }}" \
            "systemctl is-active vdev && echo 'vdev is running' \
             || { echo 'vdev is NOT running'; sudo journalctl -u vdev -n 20 --no-pager; exit 1; }"
